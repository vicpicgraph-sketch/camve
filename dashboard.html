<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Contact Submissions</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* LOGIN SCREEN */
      .login-container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .login-container h1 {
        text-align: center;
        color: #333;
        font-size: 28px;
        margin-bottom: 10px;
      }

      .login-container p {
        text-align: center;
        color: #666;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-group label {
        color: #333;
        font-weight: 600;
        font-size: 14px;
      }

      .form-group input {
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      .form-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .login-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .login-btn:hover {
        transform: translateY(-2px);
      }

      .login-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .error-message {
        background: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        display: none;
        border-left: 4px solid #c33;
      }

      .error-message.show {
        display: block;
      }

      /* DASHBOARD SCREEN */
      .dashboard-container {
        display: none;
        width: 100%;
        max-width: 1200px;
      }

      .dashboard-container.show {
        display: block;
      }

      .dashboard-header {
        background: white;
        padding: 30px;
        border-radius: 12px;
        margin-bottom: 30px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }

      .dashboard-header h1 {
        color: #333;
        font-size: 32px;
      }

      .header-stats {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .stat-box {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px 30px;
        border-radius: 8px;
        text-align: center;
        min-width: 150px;
      }

      .stat-box h3 {
        font-size: 24px;
        margin-bottom: 5px;
      }

      .stat-box p {
        font-size: 12px;
        opacity: 0.9;
      }

      .logout-btn {
        background: #ef4444;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.3s;
      }

      .logout-btn:hover {
        background: #dc2626;
      }

      /* SUBMISSIONS TABLE */
      .submissions-container {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      .submissions-container h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 24px;
      }

      .search-box {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
      }

      .search-box input {
        flex: 1;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
      }

      .search-box button {
        padding: 12px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th {
        background: #f8f9fa;
        padding: 15px;
        text-align: left;
        font-weight: 600;
        color: #333;
        border-bottom: 2px solid #e0e0e0;
      }

      td {
        padding: 15px;
        border-bottom: 1px solid #e0e0e0;
        color: #666;
      }

      tr:hover {
        background: #f8f9fa;
      }

      .status-badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .status-new {
        background: #dbeafe;
        color: #1e40af;
      }

      .status-read {
        background: #e0e7ff;
        color: #3730a3;
      }

      .date-cell {
        font-size: 12px;
        color: #999;
      }

      .message-cell {
        max-width: 300px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .action-btn {
        background: #667eea;
        color: white;
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.3s;
        margin-right: 5px;
      }

      .action-btn:hover {
        background: #5568d3;
      }

      .delete-btn {
        background: #ef4444;
      }

      .delete-btn:hover {
        background: #dc2626;
      }

      .no-data {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      .loading {
        text-align: center;
        padding: 40px 20px;
        color: #667eea;
      }

      /* MODAL */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal.show {
        display: flex;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal-content h2 {
        margin-bottom: 20px;
        color: #333;
      }

      .modal-field {
        margin-bottom: 20px;
      }

      .modal-field label {
        display: block;
        font-weight: 600;
        color: #333;
        margin-bottom: 5px;
        font-size: 14px;
      }

      .modal-field p {
        color: #666;
        word-wrap: break-word;
        background: #f8f9fa;
        padding: 12px;
        border-radius: 6px;
      }

      .modal-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .modal-buttons button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }

      .modal-btn-close {
        background: #e0e0e0;
        color: #333;
      }

      .modal-btn-delete {
        background: #ef4444;
        color: white;
      }

      @media (max-width: 768px) {
        .dashboard-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .header-stats {
          width: 100%;
          justify-content: space-between;
        }

        table {
          font-size: 12px;
        }

        td,
        th {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-container">
      <h1>🔐 Admin Dashboard</h1>
      <p>Enter your admin password to continue</p>
      <div id="errorMessage" class="error-message"></div>
      <div class="form-group">
        <label for="adminPassword">Password</label>
        <input
          type="password"
          id="adminPassword"
          placeholder="Enter admin password"
        />
      </div>
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        Login
      </button>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboardScreen" class="dashboard-container">
      <div class="dashboard-header">
        <div>
          <h1>📊 Contact Submissions</h1>
        </div>
        <div class="header-stats">
          <div class="stat-box">
            <h3 id="totalSubmissions">0</h3>
            <p>Total Submissions</p>
          </div>
          <div class="stat-box">
            <h3 id="newSubmissions">0</h3>
            <p>New Messages</p>
          </div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>

      <div class="submissions-container">
        <h2>Recent Submissions</h2>
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name, email, or phone..."
          />
          <button onclick="handleSearch()">Search</button>
        </div>
        <div class="table-wrapper">
          <table id="submissionsTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Message</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="7" class="loading">
                  <i class="fas fa-spinner fa-spin"></i> Loading submissions...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- MODAL FOR VIEWING DETAILS -->
    <div id="detailsModal" class="modal">
      <div class="modal-content">
        <h2>📧 Message Details</h2>
        <div class="modal-field">
          <label>Name</label>
          <p id="modalName"></p>
        </div>
        <div class="modal-field">
          <label>Email</label>
          <p id="modalEmail"></p>
        </div>
        <div class="modal-field">
          <label>Phone</label>
          <p id="modalPhone"></p>
        </div>
        <div class="modal-field">
          <label>Message</label>
          <p id="modalMessage"></p>
        </div>
        <div class="modal-field">
          <label>Submitted On</label>
          <p id="modalDate"></p>
        </div>
        <div class="modal-buttons">
          <button class="modal-btn-close" onclick="closeModal()">Close</button>
          <button class="modal-btn-delete" onclick="deleteSubmission()">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script>
      const ADMIN_PASSWORD = "camve@2024"; // Change this to your desired password
      let currentSubmissionId = null;
      let allSubmissions = [];

      // LOGIN HANDLER
      function handleLogin() {
        const password = document.getElementById("adminPassword").value;
        const errorEl = document.getElementById("errorMessage");

        if (!password) {
          showError("Please enter a password");
          return;
        }

        if (password === ADMIN_PASSWORD) {
          localStorage.setItem("adminLoggedIn", "true");
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("dashboardScreen").classList.add("show");
          loadSubmissions();
        } else {
          showError("❌ Incorrect password. Try again.");
          document.getElementById("adminPassword").value = "";
        }
      }

      // ENTER KEY SUPPORT
      document
        .getElementById("adminPassword")
        ?.addEventListener("keypress", (e) => {
          if (e.key === "Enter") handleLogin();
        });

      function showError(msg) {
        const errorEl = document.getElementById("errorMessage");
        errorEl.textContent = msg;
        errorEl.classList.add("show");
        setTimeout(() => errorEl.classList.remove("show"), 4000);
      }

      // LOGOUT HANDLER
      function handleLogout() {
        localStorage.removeItem("adminLoggedIn");
        document.getElementById("dashboardScreen").classList.remove("show");
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("adminPassword").value = "";
      }

      // LOAD SUBMISSIONS
      async function loadSubmissions() {
        try {
          const response = await fetch("/api/get-submissions", {
            headers: {
              Authorization: "Bearer camve@2024",
            },
          });

          if (!response.ok) {
            throw new Error("Failed to load submissions");
          }

          const data = await response.json();
          allSubmissions = data.submissions || [];

          // Update stats
          document.getElementById("totalSubmissions").textContent =
            allSubmissions.length;
          document.getElementById("newSubmissions").textContent =
            allSubmissions.filter((s) => s.status === "new").length;

          renderTable(allSubmissions);
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("tableBody").innerHTML = `
                    <tr><td colspan="7" class="no-data">
                        ❌ Failed to load submissions. Please refresh the page.
                    </td></tr>
                `;
        }
      }

      // RENDER TABLE
      function renderTable(submissions) {
        const tbody = document.getElementById("tableBody");

        if (submissions.length === 0) {
          tbody.innerHTML = `
                    <tr><td colspan="7" class="no-data">
                        📭 No submissions yet. Check back later!
                    </td></tr>
                `;
          return;
        }

        tbody.innerHTML = submissions
          .map(
            (sub) => `
                <tr>
                    <td>${escapeHtml(sub.name)}</td>
                    <td>${escapeHtml(sub.email)}</td>
                    <td>${escapeHtml(sub.phone)}</td>
                    <td class="message-cell">${escapeHtml(sub.message)}</td>
                    <td class="date-cell">${new Date(sub.created_at).toLocaleDateString()}</td>
                    <td>
                        <span class="status-badge status-${sub.status}">
                            ${sub.status === "new" ? "🔔 New" : "✓ Read"}
                        </span>
                    </td>
                    <td>
                        <button class="action-btn" onclick="viewDetails('${sub.id}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                    </td>
                </tr>
            `,
          )
          .join("");
      }

      // VIEW DETAILS
      function viewDetails(id) {
        const submission = allSubmissions.find((s) => s.id === id);
        if (!submission) return;

        currentSubmissionId = id;
        document.getElementById("modalName").textContent = submission.name;
        document.getElementById("modalEmail").textContent = submission.email;
        document.getElementById("modalPhone").textContent = submission.phone;
        document.getElementById("modalMessage").textContent =
          submission.message;
        document.getElementById("modalDate").textContent = new Date(
          submission.created_at,
        ).toLocaleString();

        document.getElementById("detailsModal").classList.add("show");

        // Mark as read
        markAsRead(id);
      }

      function closeModal() {
        document.getElementById("detailsModal").classList.remove("show");
        currentSubmissionId = null;
      }

      // MARK AS READ
      async function markAsRead(id) {
        try {
          await fetch("/api/update-submission", {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer camve@2024",
            },
            body: JSON.stringify({ id, status: "read" }),
          });

          loadSubmissions();
        } catch (error) {
          console.error("Error marking as read:", error);
        }
      }

      // DELETE SUBMISSION
      async function deleteSubmission() {
        if (!currentSubmissionId) return;

        if (!confirm("Are you sure you want to delete this submission?"))
          return;

        try {
          const response = await fetch("/api/delete-submission", {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer camve@2024",
            },
            body: JSON.stringify({ id: currentSubmissionId }),
          });

          if (response.ok) {
            closeModal();
            loadSubmissions();
            alert("✅ Submission deleted successfully!");
          }
        } catch (error) {
          console.error("Error deleting:", error);
          alert("❌ Failed to delete submission");
        }
      }

      // SEARCH HANDLER
      function handleSearch() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filtered = allSubmissions.filter(
          (sub) =>
            sub.name.toLowerCase().includes(query) ||
            sub.email.toLowerCase().includes(query) ||
            sub.phone.toLowerCase().includes(query),
        );
        renderTable(filtered);
      }

      // UTILITY FUNCTION
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Check if already logged in
      window.addEventListener("load", () => {
        if (localStorage.getItem("adminLoggedIn") === "true") {
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("dashboardScreen").classList.add("show");
          loadSubmissions();
        }
      });

      // Auto-refresh every 30 seconds
      setInterval(() => {
        if (localStorage.getItem("adminLoggedIn") === "true") {
          loadSubmissions();
        }
      }, 30000);

      // Close modal when clicking outside
      document
        .getElementById("detailsModal")
        ?.addEventListener("click", (e) => {
          if (e.target.id === "detailsModal") closeModal();
        });
    </script>
  </body>
</html>
